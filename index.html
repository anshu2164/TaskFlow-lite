<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow Lite</title>
  <link rel="stylesheet" href="styles/utilities.css">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <main class="container">
    <header>
      <div class="header-text">
        <h1>TaskFlow Lite</h1>
        <p class="tagline">Your client-side task management solution</p>
      </div>
      <button id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
    </header>

    <form id="task-form">
      <input 
        type="text" 
        id="task-input" 
        placeholder="What needs to be done?" 
        maxlength="100"
        required
      >
      <button type="submit">Add Task</button>
    </form>

    <div class="controls">
      <div class="filters">
        <button data-filter="all" class="filter-btn active">All</button>
        <button data-filter="active" class="filter-btn">Active</button>
        <button data-filter="completed" class="filter-btn">Completed</button>
      </div>
      <div id="task-stats">0 tasks left</div>
    </div>

    <ul id="task-list"></ul>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
